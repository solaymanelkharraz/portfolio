<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Soulayman Elkharraz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- COPYING THE SAME CSS VARIABLES & STYLES FROM INDEX.HTML --- */
        /* Ideally, you should move this CSS to a separate style.css file and link it! */
        :root {
            --bg-color: #050505;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-primary: #8A2BE2;
            --accent-secondary: #4B0082;
            --accent-tertiary: #9400D3;
            --accent-glow: #bd00ff;
            --gradient: linear-gradient(45deg, var(--accent-primary), var(--accent-glow));
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-code: 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }

        /* --- HEADER & NAV --- */
        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(138, 43, 226, 0.1);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .logo { font-size: 1.8rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--accent-primary); text-shadow: 0 0 10px var(--accent-primary); }
        
        nav ul { display: flex; gap: 30px; }
        nav a { position: relative; font-weight: 500; }
        nav a::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px;
            background: var(--accent-primary); transition: width 0.3s ease;
        }
        nav a:hover::after { width: 100%; }
        nav a.active::after { width: 100%; }
        nav a:hover, nav a.active { color: var(--accent-primary); }

        /* --- CONTACT PAGE SPECIFIC --- */
        .page-header {
            padding-top: 150px;
            padding-bottom: 50px;
            text-align: center;
            position: relative;
        }
        .page-header::before {
            content: ''; position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px; background: var(--accent-primary);
            filter: blur(150px); opacity: 0.2; z-index: -1; border-radius: 50%;
        }
        .page-title { font-size: 3.5rem; margin-bottom: 20px; }
        .page-desc { color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto; }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 50px;
            padding: 50px 0 100px;
        }

        /* Info Card */
        .info-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: fit-content;
        }
        .info-item { margin-bottom: 30px; }
        .info-item:last-child { margin-bottom: 0; }
        .info-label { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 5px; }
        .info-value { font-size: 1.1rem; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .info-value i { color: var(--accent-primary); }

        /* Form */
        .contact-form {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        .contact-form::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: var(--gradient);
        }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 10px; color: var(--text-muted); }
        .form-input, .form-textarea {
            width: 100%;
            padding: 15px;
            background: #050505;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-family: var(--font-main);
            transition: all 0.3s;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.2);
        }
        .form-textarea { height: 150px; resize: vertical; }

        .submit-btn {
            background: var(--gradient);
            border: none;
            padding: 15px 30px;
            color: #fff;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
        }
        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
        }

        /* --- FOOTER --- */
        footer {
            padding: 40px 0; text-align: center; color: #555; font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .contact-wrapper { grid-template-columns: 1fr; }
            .page-title { font-size: 2.5rem; }
            nav { display: none; } /* Simplified for mobile example */
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <i class="fas fa-code"></i>
                SOULAYMAN<span>DEV</span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#work">Projects</a></li>
                    <li><a href="index.html#skills">Skills</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h1 class="page-title">Get In Touch</h1>
            <p class="page-desc">Have a project in mind or just want to say hi? I'd love to hear from you.</p>
        </div>
    </section>

    <div class="container">
        <div class="contact-wrapper">
            
            <div class="info-card">
                <div class="info-item">
                    <div class="info-label">Email</div>
                    <div class="info-value">
                        <i class="fas fa-envelope"></i>
                        solaymangame2006@gmail.com
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">Location</div>
                    <div class="info-value">
                        <i class="fas fa-map-marker-alt"></i>
                        Tangier, Morocco
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">Socials</div>
                    <div class="info-value" style="gap: 15px; margin-top: 10px;">
                        <a href="#"><i class="fab fa-linkedin fa-lg"></i></a>
                        <a href="#"><i class="fab fa-github fa-lg"></i></a>
                        <a href="#"><i class="fab fa-instagram fa-lg"></i></a>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <form action="https://formspree.io/f/xpwgdnnk" method="POST">
                    <div class="form-group">
                        <label class="form-label">Your Name</label>
                        <input type="text" name="name" class="form-input" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Your Email</label>
                        <input type="email" name="email" class="form-input" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Subject</label>
                        <input type="text" name="subject" class="form-input" placeholder="Project Inquiry">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message</label>
                        <textarea name="message" class="form-textarea" placeholder="Hello, I'd like to talk about..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message <i class="fas fa-paper-plane"></i></button>
                </form>
            </div>

        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Soulayman Elkharraz. Crafted with <span
                    style="color: var(--accent-primary);">Entity</span> and code.</p>
        </div>
    </footer>

</body>
</html>
